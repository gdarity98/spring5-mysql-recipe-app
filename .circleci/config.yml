# This config was automatically generated from your source code
# Stacks detected: deps:java:.
version: 2.1

jobs:
  test-java:
    docker:
      - image: cimg/openjdk:17.0
    working_directory: ~/repo
    environment:
      # Customize the JVM maximum heap limit
      MAVEN_OPTS: -Xmx3200m
    steps:
      - checkout
      # Download and cache dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-
      - run: mvn dependency:go-offline
      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}

      # run tests! and gen code coverage
      - run: mvn integration-test cobertura:cobertura
      - store_test_results:
          path: target/surefire-reports

      #  FIX: Replaced the outdated bash script with the modern global uploader binary
      - run:
          name: Upload to Codecov
          command: |
            curl -Os https://codecov.io
            chmod +x codecov
            ./codecov -t ${CODECOV_TOKEN}

workflows:
  upload-to-codecov:
    jobs:
      - test-java #  FIX: Tells CircleCI to actually run your Java tests and upload script